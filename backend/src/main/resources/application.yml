server:
  port: 8080

spring:
  application:
    name: dining-simulation-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/canteen_simulation_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info

app:
  security:
    jwt:
      secret: ${JWT_SECRET:bjtu-dining-simulation-system-jwt-secret-key-2026}
      expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
